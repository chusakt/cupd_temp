    "<b>{na}/{n} records are undeterminable</b> (tap coords form a single blob — mostly v1.0.0 with the circle bug), so repeat/alternate can't be assessed",
    "circle bug (L==R) {degen}/{n}; both hands {bothHands}/{n}; ML risk=true {risk}"]}
};
let L='th';
const $=id=>document.getElementById(id);
const fmt=t=>new Date(t).toISOString().slice(0,10);
function fill(str,s){return str.replace(/\{(\w+)\}/g,(_,k)=>k==='n'?D.n:s[k]);}
function stats(){const T=I[L],s=D.summary;
 $('stats').innerHTML=
  `<span class="pill">${T.pills.records}: <b>${D.n}</b></span>`+
  `<span class="pill">${T.pills.range}: <b>${fmt(D.minT)} → ${fmt(D.maxT)}</b></span>`+
  `<span class="pill">${T.pills.twoTarget}: <b>${s.twoTarget}</b></span>`+
  `<span class="pill ok">${T.pills.even}: <b>${s.even}</b></span>`+
  `<span class="pill" style="color:#fb923c">${T.pills.mixed}: <b>${s.mixed}</b></span>`+
  `<span class="pill bug">${T.pills.repeat}: <b>${s.repeat}</b></span>`+
  `<span class="pill">${T.pills.na}: <b>${s.na}</b></span>`+
  `<span class="pill bug">${T.pills.bug}: <b>${s.degen}</b></span>`+
  `<span class="pill">${T.pills.risk}: <b>${s.risk}</b></span>`;
}
function familyVer(v){if(v==null||v=='None')return 'other';if(v.startsWith('1.'))return '1.0.0';if(v.startsWith('2.2'))return '2.2.x';return v;}
function colorFor(mode,r){
 if(mode==='altpat')return r.altpat==='even'?COL.ok:r.altpat==='mixed'?COL.orange:r.altpat==='repeat'?COL.bug:COL.mut;
 if(mode==='degen')return r.degen===true?COL.bug:r.degen===false?COL.ok:COL.mut;
 if(mode==='risk')return r.risk===true?COL.bug:r.risk===false?COL.ok:COL.mut;
 if(mode==='dver'){const f=familyVer(r.dver);return f==='1.0.0'?COL.c3:f==='2.2.x'?COL.c1:COL.mut;}
 if(mode==='calib')return r.calib===true?COL.ok:r.calib===false?COL.c4:COL.mut;
 if(mode==='build')return r.build==='release'?COL.c1:COL.mut;return COL.c1;
}
function legendFor(mode){$('legend').innerHTML=(I[L].leg[mode]||[]).map(([c,t])=>`<span><span class="sw" style="background:${c}"></span>${t}</span>`).join('');}
let DPR=1;
function setup(cv,h){DPR=window.devicePixelRatio||1;const w=cv.clientWidth;cv.width=w*DPR;cv.height=h*DPR;const x=cv.getContext('2d');x.setTransform(DPR,0,0,DPR,0,0);return [x,w,h];}
function yearTicks(x,X,mT,ph){const sY=new Date(D.minT).getUTCFullYear(),eY=new Date(D.maxT).getUTCFullYear();
 x.fillStyle='#8b9bb0';x.strokeStyle='#2b3648';x.textAlign='center';x.font='11px sans-serif';
 for(let y=sY;y<=eY+1;y++){const t=Date.UTC(y,0,1);if(t<D.minT||t>D.maxT)continue;const px=X(t);x.globalAlpha=.55;x.beginPath();x.moveTo(px,mT);x.lineTo(px,mT+ph);x.stroke();x.globalAlpha=1;x.fillText(y,px,mT+ph+15);}
 for(let y=sY;y<=eY;y++)for(const mo of[3,6,9]){const t=Date.UTC(y,mo,1);if(t<D.minT||t>D.maxT)continue;const px=X(t);x.globalAlpha=.16;x.beginPath();x.moveTo(px,mT);x.lineTo(px,mT+ph);x.stroke();x.globalAlpha=1;}}
function drawBars(){const cv=$('bars');const [x,w,h]=setup(cv,300);x.clearRect(0,0,w,h);
 const mL=40,mR=14,mT=12,mB=42,pw=w-mL-mR,ph=h-mT-mB;const max=Math.max(...D.hist.map(d=>d.deg+d.fix+d.unk),1);const X=t=>mL+((t-D.minT)/(D.maxT-D.minT))*pw;
 x.strokeStyle='#2b3648';x.fillStyle='#8b9bb0';x.font='11px sans-serif';x.textAlign='right';
 for(let g=0;g<=max;g+=Math.max(1,Math.ceil(max/5))){const y=mT+ph-(g/max)*ph;x.globalAlpha=.4;x.beginPath();x.moveTo(mL,y);x.lineTo(w-mR,y);x.stroke();x.globalAlpha=1;x.fillText(g,mL-6,y+3);}
 yearTicks(x,X,mT,ph);const bw=Math.max(3,pw/D.hist.length*0.8);
 D.hist.forEach(d=>{const t=Date.UTC(+d.m.slice(0,4),+d.m.slice(5,7)-1,15);const cx=X(t);let y0=mT+ph;
   [[d.fix,COL.ok],[d.deg,COL.bug],[d.unk,COL.mut]].forEach(([cnt,col])=>{if(!cnt)return;const bh=(cnt/max)*ph;x.fillStyle=col;x.fillRect(cx-bw/2,y0-bh,bw,bh);y0-=bh;});
   const tot=d.deg+d.fix+d.unk;if(tot){x.fillStyle='#cbd5e1';x.textAlign='center';x.font='9px sans-serif';x.fillText(tot,cx,y0-3);}});
}
let map=[];
function drawStrip(){const mode=$('colorby').value;legendFor(mode);
 const cv=$('strip');const [x,w,h]=setup(cv,220);x.clearRect(0,0,w,h);
 const mL=40,mR=14,mT=12,mB=42,pw=w-mL-mR,ph=h-mT-mB;const X=t=>mL+((t-D.minT)/(D.maxT-D.minT))*pw;
 x.strokeStyle='#2b3648';yearTicks(x,X,mT,ph);
 const order=mode==='altpat'?(r=>r.altpat==='na'?0:1):(_=>1);
 const sorted=D.recs.map((r,i)=>({r,i})).sort((p,q)=>order(p.r)-order(q.r));
 map=sorted.map(({r,i})=>{const px=X(r.t),py=mT+ph*0.5+Math.sin(i*2.39996)*ph*0.40;
   const isHi=mode==='altpat'&&(r.altpat==='repeat'||r.altpat==='mixed');
   x.globalAlpha=mode==='altpat'&&r.altpat==='na'?0.5:0.85;x.fillStyle=colorFor(mode,r);x.beginPath();x.arc(px,py,isHi?3.6:2.2,0,7);x.fill();
   if(isHi){x.globalAlpha=1;x.strokeStyle='#fff';x.lineWidth=1;x.beginPath();x.arc(px,py,5,0,7);x.stroke();}return {px,py,r};});x.globalAlpha=1;
}
function tip(e){const T=I[L].tip;const cv=$('strip');const rct=cv.getBoundingClientRect();const mx=e.clientX-rct.left,my=e.clientY-rct.top;
 let best=null,bd=70;map.forEach(o=>{const d=(o.px-mx)**2+(o.py-my)**2;if(d<bd){bd=d;best=o;}});
 const tp=$('tip');if(best){const r=best.r;
   const ap={even:`<b style="color:#22c55e">${T.even}</b>`,mixed:`<b style="color:#fb923c">${T.mixed}</b>`,repeat:`<b style="color:#ef4444">${T.repeat}</b>`,na:T.na}[r.altpat];
   tp.style.display='block';tp.style.left=(e.clientX+12)+'px';tp.style.top=(e.clientY+12)+'px';
   tp.innerHTML=`${fmt(r.t)} · ${r.uid}<br>${T.press}: ${ap}${r.altrate!=null?` (${T.alt} ${(r.altrate*100|0)}%)`:''}<br>${T.ratio}: ${r.cratio??'-'} · ${T.circle}: ${r.degen===true?`<b style="color:#ef4444">${T.bugT}</b>`:r.degen===false?`<b style="color:#22c55e">${T.okT}</b>`:'-'} · v${r.dver}<br>risk: ${r.risk===true?'true':r.risk===false?'false':'-'} · ${T.taps}: ${r.ntapL??'-'}/${r.ntapR??'-'}`;}
 else tp.style.display='none';
}
function notes(){const T=I[L],s=D.summary;$('notes').innerHTML=T.notes.map(t=>`<li>${fill(t,s)}</li>`).join('');}
function buildSelect(){const cur=$('colorby').value||'altpat';const T=I[L].opt;
 $('colorby').innerHTML=Object.keys(T).map(k=>`<option value="${k}"${k===cur?' selected':''}>${T[k]}</option>`).join('');}
function applyLang(){const T=I[L];document.documentElement.lang=L;
 $('h1').textContent=T.h1;$('sub').textContent=T.sub;$('lblBars').textContent=T.bars;$('lblColor').textContent=T.colorlabel;
 $('lblStrip').textContent=T.strip;$('lblNotes').textContent=T.notesH;
 buildSelect();stats();notes();drawBars();drawStrip();
 $('bTH').classList.toggle('on',L==='th');$('bEN').classList.toggle('on',L==='en');
}
function redraw(){drawBars();drawStrip();}
window.addEventListener('resize',redraw);
$('colorby').addEventListener('change',drawStrip);
$('strip').addEventListener('mousemove',tip);
$('strip').addEventListener('mouseleave',()=>$('tip').style.display='none');
$('bTH').addEventListener('click',()=>{L='th';applyLang();});
$('bEN').addEventListener('click',()=>{L='en';applyLang();});
applyLang();
</script></body></html>
