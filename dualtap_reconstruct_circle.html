const I={

function dist(a,b){return Math.hypot(a[0]-b[0],a[1]-b[1]);}
function panel(rec,kind){const T=I[L];
 const card=document.createElement('div');card.className='card';
 const good=kind==='good';
 const ev=rec.P.filter((_,i)=>i%2===0), od=rec.P.filter((_,i)=>i%2===1);
 const sep=Math.round(dist(rec.even,rec.odd));
 card.innerHTML=`<div class="ct">${good?'<b class="good">'+T.good+' (v'+rec.ver+')</b>':'<b class="bad">'+T.bug+' (v'+rec.ver+')</b>'} · n=${rec.P.length} · ${T.sep} = <b>${sep}px</b></div>`;
 const cv=document.createElement('canvas');cv.height=260;card.appendChild(cv);
 const cap=document.createElement('div');cap.className='cap';cap.textContent=good?T.capGood:T.capBug;card.appendChild(cap);
 document.getElementById('grid').appendChild(card);
 requestAnimationFrame(()=>{
  const DPR=window.devicePixelRatio||1,w=cv.clientWidth,h=260;cv.width=w*DPR;cv.height=h*DPR;
  const x=cv.getContext('2d');x.setTransform(DPR,0,0,DPR,0,0);
  let pts=rec.P.slice();const circSame=good;
  if(circSame){pts.push([rec.cL.x,rec.cL.y]);pts.push([rec.cR.x,rec.cR.y]);}
  let minx=Math.min(...pts.map(p=>p[0])),maxx=Math.max(...pts.map(p=>p[0])),miny=Math.min(...pts.map(p=>p[1])),maxy=Math.max(...pts.map(p=>p[1]));
  const pad=40,sw=maxx-minx||1,sh=maxy-miny||1,m=24,sc=Math.min((w-2*m)/(sw+pad),(h-2*m)/(sh+pad));
  const cx=(minx+maxx)/2,cy=(miny+maxy)/2;const X=px=>w/2+(px-cx)*sc,Y=py=>h/2+(py-cy)*sc;
  if(circSame){for(const c of [rec.cL,rec.cR]){x.strokeStyle='#94a3b8';x.lineWidth=1.5;x.globalAlpha=.9;x.beginPath();x.arc(X(c.x),Y(c.y),(c.r||56)*sc,0,7);x.stroke();}x.globalAlpha=1;}
  ev.forEach(p=>{x.fillStyle='#fb923c';x.globalAlpha=.8;x.beginPath();x.arc(X(p[0]),Y(p[1]),3,0,7);x.fill();});
  od.forEach(p=>{x.fillStyle='#2dd4bf';x.globalAlpha=.8;x.beginPath();x.arc(X(p[0]),Y(p[1]),3,0,7);x.fill();});
  x.globalAlpha=1;
  [['#fb923c',rec.even],['#2dd4bf',rec.odd]].forEach(([c,ct])=>{x.strokeStyle='#fff';x.fillStyle=c;x.lineWidth=2;x.beginPath();x.arc(X(ct[0]),Y(ct[1]),6,0,7);x.fill();x.stroke();});
 });
}
function render(){const T=I[L];document.documentElement.lang=L;

 document.getElementById('leg').innerHTML=`<span><span class="sw" style="background:var(--ev)"></span>${T.legEven}</span><span><span class="sw" style="background:var(--od)"></span>${T.legOdd}</span><span><span class="sw" style="background:var(--cir);border-radius:2px"></span>${T.legCir}</span>`;
